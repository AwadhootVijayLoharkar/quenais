# environment.yml
# Create with: mamba env create -f environment.yml -p ./quenais-env
# Activate with: mamba activate ./quenais-env

channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - clang
  - cmake
  - openblas
  - gfortran
  - numpy>=1.24
  - scipy>=1.10
  - matplotlib>=3.7
  - h5py>=3.9
  - networkx>=3.0
  - rust